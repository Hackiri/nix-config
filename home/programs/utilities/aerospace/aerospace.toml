# Start AeroSpace at login
start-at-login = true

# Recommended macOS settings for better window management (run once in terminal):
# defaults write -g NSAutomaticWindowAnimationsEnabled -bool false
# defaults write -g NSWindowShouldDragOnGesture -bool true
# defaults write com.apple.spaces spans-displays -bool true && killall SystemUIServer

# JankyBorders + optional sketchybar on startup
after-startup-command = [
  'exec-and-forget borders active_color=0x66ffffff inactive_color=0x00ffffff width=1 style=round rder=above hidpi=on'
]

# Notify Sketchybar about workspace change (uncomment when sketchybar is configured)
# exec-on-workspace-change = ['/bin/bash', '-c',
#   'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
# ]

# Normalization settings
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion padding (px visible behind stacked windows, 0 = invisible)
accordion-padding = 30

# Default root container settings
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus (lazy = only moves if cursor is outside target)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Automatically unhide macOS hidden apps
automatically-unhide-macos-hidden-apps = true

# Key mapping preset
[key-mapping]
preset = 'qwerty'

# Gaps settings
[gaps]
inner.horizontal = 16
inner.vertical = 16
outer.left = 16
outer.right = 16
outer.bottom = 16
outer.top = 16

# Workspace-to-monitor assignments
# 1-5: main monitor (focused work)
# 6-9: secondary monitor (browser, comms, overflow)
[workspace-to-monitor-force-assignment]
1 = 'main'       # Terminal
2 = 'main'       # Editor
3 = 'main'       # Dev tools (Docker, Postman, DB)
4 = 'main'       # Notes & AI
5 = 'main'       # Productivity
6 = 'secondary'  # Browser
7 = 'secondary'  # Media/Comms
8 = 'secondary'  # Video
9 = 'secondary'  # Float/misc

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Main mode
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.main.binding]

# Disable macOS "hide application" shortcuts (conflicts with tiling)
cmd-h = []
cmd-alt-h = []

# Quick terminal launch
alt-shift-enter = 'exec-and-forget open -na wezterm'

# Focus movement (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Toggle focus between last two windows
alt-f = 'focus-back-and-forth'

# Toggle between last two workspaces
alt-tab = 'workspace-back-and-forth'

# Focus monitors
alt-left = 'focus-monitor left'
alt-right = 'focus-monitor right'
alt-up = 'focus-monitor up'
alt-down = 'focus-monitor down'

# Window movement
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Move window to monitors
alt-shift-left = 'move-node-to-monitor left'
alt-shift-right = 'move-node-to-monitor right'
alt-shift-up = 'move-node-to-monitor up'
alt-shift-down = 'move-node-to-monitor down'

# Resize windows
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layout
alt-slash  = 'layout tiles horizontal vertical'
alt-comma  = 'layout accordion horizontal vertical'
alt-period = 'layout floating tiling'

# Fullscreen
alt-shift-f = 'fullscreen'
alt-f11     = 'macos-native-fullscreen'

# Window management
alt-q       = 'close'
alt-shift-q = 'close-all-windows-but-current'
alt-enter   = 'balance-sizes'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Workspace switching (alt+number)
# 1=Terminal 2=Editor 3=DevTools 4=Notes 5=Productivity
# 6=Browser  7=Media  8=Video   9=Float
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Workspace cycling
alt-leftSquareBracket  = 'workspace prev --wrap-around'
alt-rightSquareBracket = 'workspace next --wrap-around'

# Move window to workspace (focus follows window)
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

# Config reload
alt-shift-c = 'reload-config'

# Flatten layout tree
cmd-ctrl-alt-shift-d = 'flatten-workspace-tree'

# Toggle floating
cmd-ctrl-alt-shift-f = 'layout floating tiling'

# Enter modes
alt-r               = 'mode resize'
alt-shift-semicolon = 'mode service'
alt-shift-space     = 'mode launch'
cmd-ctrl-alt-shift-m = 'mode merge'
cmd-ctrl-alt-shift-w = 'mode workspace'
cmd-ctrl-alt-shift-r = 'mode resize'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Launch mode (alt-shift-space) - app launching with single keypress
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.launch.binding]
# Terminals
w = ['exec-and-forget open -na wezterm', 'mode main']
k = ['exec-and-forget kitty', 'mode main']
# Editors
v = ['exec-and-forget open -na neovide', 'mode main']
e = ['exec-and-forget open -a Emacs', 'mode main']
c = ['exec-and-forget open -a "Visual Studio Code"', 'mode main']
# Browser
b = ['exec-and-forget open -a "Brave Browser"', 'mode main']
# Communication
t = ['exec-and-forget open -a Telegram', 'mode main']
s = ['exec-and-forget open -a Slack', 'mode main']
d = ['exec-and-forget open -a Discord', 'mode main']
z = ['exec-and-forget open -a zoom.us', 'mode main']
# Notes & productivity
n = ['exec-and-forget open -a Notion', 'mode main']
o = ['exec-and-forget open -a Obsidian', 'mode main']
# Utilities
f = ['exec-and-forget open -a Finder', 'mode main']
p = ['exec-and-forget open -a Postman', 'mode main']
# Exit
esc   = 'mode main'
enter = 'mode main'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Service mode (alt-shift-;) - config, layout, and tree manipulation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
e         = ['enable toggle', 'mode main']
m         = ['mode main', 'macos-native-minimize']
# Join with adjacent windows (tree manipulation)
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Merge mode (cmd-ctrl-alt-shift-m) - join windows into containers
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.merge.binding]
space = 'mode main'
esc   = 'mode main'
left  = ['join-with left',  'mode main']
down  = ['join-with down',  'mode main']
up    = ['join-with up',    'mode main']
right = ['join-with right', 'mode main']

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Workspace mode (cmd-ctrl-alt-shift-w) - workspace/monitor navigation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.workspace.binding]
space = 'mode main'
esc   = 'mode main'
left  = ['workspace prev', 'move-mouse window-force-center']
right = ['workspace next', 'move-mouse window-force-center']
up    = ['focus-monitor prev', 'move-mouse window-force-center']
down  = ['focus-monitor next', 'move-mouse window-force-center']
shift-right = ['move-node-to-workspace next --focus-follows-window']
shift-left  = ['move-node-to-workspace prev --focus-follows-window']
shift-up    = ['move-node-to-monitor prev --focus-follows-window']
shift-down  = ['move-node-to-monitor next --focus-follows-window']

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Resize mode (alt-r / cmd-ctrl-alt-shift-r)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[mode.resize.binding]
space = 'mode main'
esc   = 'mode main'
enter = 'mode main'
h     = 'resize width -50'
j     = 'resize height +50'
k     = 'resize height -50'
l     = 'resize width +50'
left  = 'resize width -16'
down  = 'resize height -16'
up    = 'resize height +16'
right = 'resize width +16'
shift-left  = 'resize width -64'
shift-down  = 'resize height -64'
shift-up    = 'resize height +64'
shift-right = 'resize width +64'
minus = 'resize smart -50'
equal = 'resize smart +50'
b     = ['balance-sizes', 'mode main']

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

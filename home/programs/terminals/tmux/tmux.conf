# default-terminal set via Nix (programs.tmux.terminal)

# Enable true color support
set-option -a terminal-features 'tmux-256color'
set-option -a terminal-overrides 'xterm-256color:RGB'

# Enable passthrough for image.nvim
set -g allow-passthrough on

#### Action key
set-option -g prefix C-b
set-option -g prefix2 none
set-option -g repeat-time 0
set-option -g focus-events on

## Reload Config: checks at both locations
bind r if-shell "[ -f ~/.config/tmux/tmux.conf ]" \
    "source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded from .config/tmux/tmux.conf!'" \
    "source-file ~/.tmux.conf \; display-message 'Config reloaded from .tmux.conf!'"

## New window
bind c new-window -c "#{pane_current_path}"

## Set tmux to allow renaming windows and disable automatic renaming
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

## Split Panes
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

## Copy Mode  https://waylonwalker.com/tmux-copy-mode/
# mode-keys set via Nix (programs.tmux.keyMode)
bind Enter copy-mode
bind -n M-Enter copy-mode

bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

## Navigate TMUX Windows. (Must edit the terminal config to send these keys)
bind -n C-Tab select-window -n
bind -n C-S-Tab select-window -p

## vim-like pane switching : Requires vim-tmux-navigator plugin
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

## vim-like pane resizing (uppercase to avoid conflict with select-pane)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

## Home-row window jumping (u/i/o/p = windows 1-4)
bind u select-window -t 1
bind i select-window -t 2
bind o select-window -t 3
bind p select-window -t 4
bind m previous-window

## Sessions
bind C-n command-prompt -p "New Session:" "new-session -A -s '%%'"
bind R command-prompt -p "Rename Session:" "rename-session '%%'"
bind C-k confirm kill-session
bind Space run-shell "sesh last"  # Toggle between last two sessions (via sesh)

# Quick Claude popup (prefix + C)
bind C display-popup -E -w 80% -h 80% "claude"

## Broadcast & Sync
bind E command-prompt -p "Broadcast:" "run-shell \"for p in \$(tmux list-panes -F '###{pane_id}'); do tmux send-keys -t \\\$p '%1' Enter; done\""
bind Q set-window-option synchronize-panes \; display-message "Sync #{?synchronize-panes,ON,OFF}"

## Resurrect
# https://haseebmajid.dev/posts/2023-09-01-til-how-to-fix-tmux-resurrect-on-nixos/
resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all 'target=$(readlink -f $resurrect_dir/last); sed "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/home/$USER/.nix-profile/bin/||g" $target | sponge $target'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

## Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

## MISC
set -g renumber-windows on       # renumber all windows when any window is closed
set -g detach-on-destroy off     # don't exit from tmux when closing a session
# mouse, base-index, pane-base-index, history-limit set via Nix

# Enable extended support for some more sophisticated terminal emulator
# features. Disable them if they are causing problems!
set-option -s extended-keys on

# escape-time set via Nix (programs.tmux.escapeTime)

## Plugin rebinds (avoid conflicts with new keybindings)
set -g @thumbs-key F            # Move tmux-thumbs from Space to prefix+F
set -g @fzf-url-bind U          # Move fzf-tmux-url from u to prefix+U

## Catppuccin Plugin (v2, using Eldritch colors)
# Options use -g so catppuccin's -ogq defaults (only-if-not-set) won't override
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_number_position "right"

# Eldritch color overrides
set -g @catppuccin_status_background "#0D1116"
set -g @catppuccin_pane_active_border_style "fg=#37f499"
set -g @catppuccin_pane_border_style "fg=#565f89"
set -g @catppuccin_window_current_number_color "#37f499"
set -g @catppuccin_window_current_text_color "#141b22"
set -g @catppuccin_window_number_color "#565f89"
set -g @catppuccin_window_text_color "#232e3b"
set -g @catppuccin_session_color "#37f499"
set -g @catppuccin_directory_color "#987afb"

# Module overrides (Eldritch palette)
set -g @catppuccin_date_time_text " %H:%M"
set -g @catppuccin_date_time_color "#f265b5"
set -g @catppuccin_host_color "#a48cf2"
set -g @catppuccin_host_text " #h"
set -g @catppuccin_session_text " #S #{continuum_status}"

# Status Bar — #{E:...} is evaluated at render time, so catppuccin
# template variables resolve even though the plugin loads after this
set -g status-position top
set -g status-justify "absolute-centre"
set -g status-left-length 120
set -g status-right-length 250
# Status-line left/right are set in default.nix (after catppuccin loads)

# Enable Touch ID authentication in tmux
set-option -g default-command "reattach-to-user-namespace -l $SHELL"

## Pane Border Styling
set -g pane-border-format ''
set -g pane-border-status bottom
set -g pane-border-lines single
set -g pane-border-indicators colour
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#37f499'

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#S - #{pane_title}"

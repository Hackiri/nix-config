##### Terminal integration

# default-terminal set via Nix (programs.tmux.terminal)
# mouse, pane-base-index, history-limit set via Nix
# escape-time set via Nix (programs.tmux.escapeTime)

# True color support.
set-option -a terminal-features 'tmux-256color'
set-option -a terminal-overrides 'xterm-256color:RGB'

# Enable extended terminal key support.
set-option -s extended-keys on

# Allow tmux to pass through keys to terminal apps (for sesh, etc.).
set -g allow-passthrough on

# Use system clipboard for copy/paste (tmux 3.2+).
set -s set-clipboard on

# Enable Touch ID authentication in tmux.
set-option -g default-command "reattach-to-user-namespace -l $SHELL"

# Allow the title bar to adapt to whatever host you connect to.
set -g set-titles on
set -g set-titles-string "#S - #{pane_title}"

##### Core behavior

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix
set-option -g repeat-time 0
set-option -g focus-events on

# Start from window index 1 instead of 0.
set -g base-index 1

# Rename windows from the current pane command.
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Keep window numbers compact and stay attached when a session closes.
set -g renumber-windows on
set -g detach-on-destroy off

##### Reload

bind r if-shell "[ -f ~/.config/tmux/tmux.conf ]" \
    "source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded from .config/tmux/tmux.conf!'" \
    "source-file ~/.tmux.conf \; display-message 'Config reloaded from .tmux.conf!'"

##### Sessions

bind C-n command-prompt -p "New Session:" "new-session -A -s '%%'"
bind R command-prompt -p "Rename Session:" "rename-session '%%'"
bind C-k confirm kill-session
bind Space run-shell "sesh last" # Toggle between last two sessions (via sesh).

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

##### Windows

bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

bind -r Left swap-window -t -1 \; select-window -t -1
bind -r Right swap-window -t +1 \; select-window -t +1

# Navigate tmux windows. Terminal config must send these keys.
bind -n C-Tab select-window -n
bind -n C-S-Tab select-window -p
bind Tab last-window

# Home-row window jumping (u/i/o/p = windows 1-4).
bind u select-window -t 1
bind i select-window -t 2
bind o select-window -t 3
bind p select-window -t 4

##### Panes

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-like pane switching. Requires vim-tmux-navigator plugin.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Vim-like pane resizing. Uses uppercase keys to avoid select-pane conflicts.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Broadcast and sync.
bind E command-prompt -p "Broadcast:" "run-shell \"for p in \$(tmux list-panes -F '###{pane_id}'); do tmux send-keys -t \\\$p '%1' Enter; done\""
bind Q set-window-option synchronize-panes \; display-message "Sync #{?synchronize-panes,ON,OFF}"

# Mouse toggle.
bind m set -g mouse \; display-message "mouse #{?mouse,on,off}"

##### Copy mode

# mode-keys set via Nix (programs.tmux.keyMode)
# https://waylonwalker.com/tmux-copy-mode/
bind Enter copy-mode
bind -n M-Enter copy-mode
bind C-l send-keys 'C-l' \; run 'sleep 0.1' \; clear-history

bind-key -T copy-mode-vi 'v'   send-keys -X begin-selection
bind-key -T copy-mode-vi 'V'   send-keys -X select-line
bind-key -T copy-mode-vi 'y'   send-keys -X copy-selection \; display-message "Copied to clipboard!"
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'H'   send-keys -X start-of-line
bind-key -T copy-mode-vi 'L'   send-keys -X end-of-line

##### Popups

# Quick Claude popup (prefix + C).
bind C display-popup -E -w 80% -h 80% "claude"

##### Pop-Up: LazyGit
bind G display-popup -d "#{pane_current_path}" -E -w 80% -h 80% -E lazygit

##### Plugin keybinds

# Avoid conflicts with custom keybindings.
set -g @thumbs-key F
set -g @fzf-url-bind U

##### Resurrect

# https://haseebmajid.dev/posts/2023-09-01-til-how-to-fix-tmux-resurrect-on-nixos/
resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all 'target=$(readlink -f $resurrect_dir/last); sed "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/home/$USER/.nix-profile/bin/||g" $target | sponge $target'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

##### Continuum

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

##### Catppuccin

# Options use -g so catppuccin's -ogq defaults (only-if-not-set) won't override.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_number_position "right"

# Eldritch color overrides.
set -g @catppuccin_status_background "#0D1116"
set -g @catppuccin_pane_active_border_style "fg=#37f499"
set -g @catppuccin_pane_border_style "fg=#565f89"
set -g @catppuccin_window_current_number_color "#37f499"
set -g @catppuccin_window_current_text_color "#141b22"
set -g @catppuccin_window_number_color "#565f89"
set -g @catppuccin_window_text_color "#232e3b"
set -g @catppuccin_session_color "#37f499"
set -g @catppuccin_directory_color "#987afb"

# Module overrides.
set -g @catppuccin_date_time_text " %H:%M"
set -g @catppuccin_date_time_color "#f265b5"
set -g @catppuccin_host_color "#a48cf2"
set -g @catppuccin_host_text " #h"
set -g @catppuccin_session_text " #S #{continuum_status}"

##### Status bar

# Status-line left/right are set in default.nix after catppuccin loads.
set -g status-position top
set -g status-justify "absolute-centre"
set -g status-left-length 120
set -g status-right-length 250

##### Pane borders

set -g pane-border-format ''
set -g pane-border-status bottom
set -g pane-border-lines single
set -g pane-border-indicators colour
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#37f499'

[bell]
animation = "EaseOutExpo"
color = "#ffffff"
duration = 0

[colors]
primary = { background = "#0D1116", foreground = "#ebfafa" }
cursor = { text = "#f8f8f2", cursor = "#37f499" }
normal = { black = "#21222c", red = "#f9515d", green = "#37f499", yellow = "#e9f941", blue = "#9071f4", magenta = "#f265b5", cyan = "#04d1f9", white = "#ebfafa" }
bright = { black = "#7081d0", red = "#f16c75", green = "#69f8b3", yellow = "#f1fc79", blue = "#a48cf2", magenta = "#fd92ce", cyan = "#66e4fd", white = "#ffffff" }

[colors.search.focused_match]
background = "#a48cf2"
foreground = "#212337"

[colors.search.matches]
background = "#7081d0"
foreground = "#ebfafa"

[colors.hints.start]
background = "#f1fc79"
foreground = "#212337"

[colors.hints.end]
background = "#a48cf2"
foreground = "#ebfafa"

[colors.line_indicator]
background = "None"
foreground = "None"

[colors.selection]
background = "#bf4f8e"
text = "#ebfafa"

[colors.vi_mode_cursor]
cursor = "CellForeground"
text = "CellBackground"

[[colors.indexed_colors]]
color = "#f7c67f"
index = 16

[[colors.indexed_colors]]
color = "#f9515d"
index = 17

[cursor]
thickness = 0.15
unfocused_hollow = true
vi_mode_style = "Block"
[cursor.style]
blinking = "On"
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 16.0
[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[general]
live_config_reload = true

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Command"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Command"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Command"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "N"
mods = "Command"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "Return"
mods = "Command"

[[keyboard.bindings]]
action = "SearchForward"
key = "F"
mods = "Command|Control"

[[keyboard.bindings]]
action = "SearchBackward"
key = "B"
mods = "Command|Control"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Command"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Command"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Command"

[terminal]

[mouse]
hide_when_typing = true
[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
opacity = 0.8
decorations = "buttonless"
dynamic_padding = true
blur = true
startup_mode = "windowed"
option_as_alt = 'Both'

[window.dimensions]
columns = 133
lines = 40

[window.padding]
x = 10
y = 10

[keyboard]

name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Update flake inputs
        run: nix flake update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs"
          body: |
            Automated weekly flake input update.

            Run `nix flake lock --update-input <name>` to update a single input.
          branch: flake-update
          delete-branch: true
